<!DOCTYPE html>
<html>
<head>
  <title>Create AI Short</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Create AI Short</h1>

<input type="text" placeholder="Enter video topic">

<br><br>

<button onclick="generateShort()">🚀 Generate AI Short</button>

<script src="app.js"></script>

</body>
</html>
<p id="result"></p>
<div id="preview" style="display:none; margin-top:20px;">
  <h2>🎬 Video Preview</h2>

  <div style="
    width:220px;
    height:390px;
    background:#1e293b;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    margin:auto;
  ">
    ▶️
  </div>

  <br>

  <button>⬇ Download</button>
  <button>📤 Upload to YouTube</button>
</div>
<p>💡 Try these topics:</p>

<button onclick="document.querySelector('input').value='Motivation'">Motivation</button>

<button onclick="document.querySelector('input').value='Space Facts'">Space Facts</button>

<button onclick="document.querySelector('input').value='Money Tips'">Money Tips</button>
<br><br>

<label><b>🎙 Select AI Voice</b></label>

<br><br>

<select id="voice">
    <option>English Male</option>
    <option>English Female</option>
    <option>Hindi Male</option>
    <option>Hindi Female</option>
</select>
<br><br>

<label><b>🎨 Select Video Style</b></label>

<br><br>

<select id="style">
    <option>Cinematic</option>
    <option>Realistic</option>
    <option>Anime</option>
    <option>Cartoon</option>
</select>
